name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'

      - name: Install beamtalk
        run: |
          curl -sL https://github.com/jamesc/beamtalk/releases/download/v0.1.0/beamtalk-0.1.0-linux-x86_64.tar.gz -o beamtalk.tar.gz
          tar xzf beamtalk.tar.gz
          sudo mv beamtalk /usr/local/bin/
          beamtalk --version

      - name: Build
        run: beamtalk build

      - name: Test
        run: beamtalk test
